services:
  - type: web
    name: atp-dense-tester
    runtime: python
    repo: https://github.com/ASIM-SOVEREIGN/atp-dense-tester
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SOVEREIGN_ENDPOINTS
        sync: false
      - key: ATP_BRIDGE_PUBLIC_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
