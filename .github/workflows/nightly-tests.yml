name: Nightly ATP Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Make test script executable
        run: chmod +x run_dense_test.sh
      
      - name: Run dense test suite
        env:
          API_URL: https://vexr-ultra.onrender.com
        run: ./run_dense_test.sh
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/
            *.json
            *.log
