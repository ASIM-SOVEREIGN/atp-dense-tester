version: '3.8'

services:
  atp-tester:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SOVEREIGN_ENDPOINTS=${SOVEREIGN_ENDPOINTS}
      - ATP_BRIDGE_PUBLIC_KEY=${ATP_BRIDGE_PUBLIC_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
